<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDL Workbench - Build Tasks</title>
    <link rel="stylesheet" href="style.css?v=20260205">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tasks-container {
            display: grid;
            grid-template-columns: 1fr;
            /* Nur eine Spalte, da Konsole ausgeblendet */
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .task-sidebar {
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 25px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .task-group {
            margin-bottom: 30px;
        }

        .task-group h3 {
            margin-bottom: 15px;
            font-size: 1rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .task-btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .task-btn:hover {
            background: var(--hover-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .task-btn i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
            color: #88c0d0;
        }

        /* Konsole explizit ausblenden */
        .console-panel {
            display: none !important;
        }

        .online-notice {
            background: rgba(136, 192, 208, 0.1);
            border: 1px solid #88c0d0;
            color: #88c0d0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="header-left">
                <span class="logo">GDL Workbench</span>
                <span class="project-info">Build-Umgebung</span>
                <span style="font-size: 0.85em; color: #8899a6; margin-left: 15px;">v1.5.0</span>
            </div>
            <div class="header-right">
                <span style="font-size: 0.8em; color: #8899a6; margin-right: 15px;">Joachim Suehlo ©2026
                    b-prisma®</span>
            </div>
        </header>

        <!-- MAIN NAVIGATION -->
        <nav class="main-nav">
            <a href="dashboard.html" class="nav-button">Projektverwaltung</a>
            <a href="object-selection.html" class="nav-button">Objektverwaltung</a>
            <a href="param-management.html" class="nav-button">Parameterverwaltung</a>
            <a href="index.html" class="nav-button">UI Designer</a>
            <a href="script-editor.html" class="nav-button">Skript Editor</a>
            <a href="build-tasks.html" class="nav-button active">Build Tasks</a>
        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="tasks-container">
            <div class="online-notice">
                <i class="fas fa-info-circle"></i> Aus Sicherheitsgründen ist die Build-Konsole in der Online-Version
                deaktiviert.
            </div>

            <aside class="task-sidebar">
                <div class="task-group">
                    <h3>Allgemeine Tasks</h3>
                    <button class="task-btn" data-task="x2g_all"><i class="fas fa-file-export"></i> XML zu GSM
                        (Alle)</button>
                    <button class="task-btn" data-task="g2x_all"><i class="fas fa-file-import"></i> GSM zu XML
                        (Alle)</button>
                    <button class="task-btn" data-task="lcf"><i class="fas fa-box"></i> LCF Container erstellen</button>
                </div>

                <div class="task-group">
                    <h3>Ressourcen & Bilder</h3>
                    <button class="task-btn" data-task="images_all"><i class="fas fa-images"></i> Picture.xml
                        aktualisieren</button>
                    <button class="task-btn" data-task="svg2tiff"><i class="fas fa-vector-square"></i> SVG zu TIFF
                        konvertieren</button>
                    <button class="task-btn" data-task="paramcsv_all"><i class="fas fa-table"></i> Parameter CSV
                        Export</button>
                </div>

                <div class="task-group">
                    <h3>HSF Konvertierung</h3>
                    <button class="task-btn" data-task="g2h_all"><i class="fas fa-folder-open"></i> GSM zu HSF
                        (Alle)</button>
                    <button class="task-btn" data-task="h2g_all"><i class="fas fa-file-archive"></i> HSF zu GSM
                        (Alle)</button>
                </div>
            </aside>
        </main>
    </div>

    <script src="build-tasks.js?v=20260205"></script>
</body>

</html>
