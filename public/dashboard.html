<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDL-UI-Studio - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #2e3440;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: #3b4252;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #88c0d0;
            font-size: 2em;
        }

        .toolbar {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #5e81ac;
            color: white;
        }

        .btn-primary:hover {
            background: #81a1c1;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(94, 129, 172, 0.3);
        }

        .btn-secondary {
            background: #4c566a;
            color: #d8dee9;
        }

        .btn-secondary:hover {
            background: #5e6a7e;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .search-bar {
            background: #3b4252;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #4c566a;
            border-radius: 6px;
            font-size: 16px;
            background: #2e3440;
            color: #d8dee9;
            transition: border 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #88c0d0;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .filter-tab {
            padding: 8px 16px;
            border: 2px solid #4c566a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            background: #2e3440;
            color: #d8dee9;
        }

        .filter-tab.active {
            background: #5e81ac;
            color: white;
            border-color: #5e81ac;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .project-card {
            background: #3b4252;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            color: #eceff4;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            background: #434c5e;
        }

        .project-card.status-active {
            border-left: 5px solid #a3be8c;
            background: #434c5e;
        }

        .project-card.status-archive {
            border-left: 5px solid #4c566a;
            background: #3b4252;
        }

        .project-card.status-wip {
            border-left: 5px solid #ebcb8b;
            background: #434c5e;
        }

        .project-card.status-urgent {
            border-left: 5px solid #bf616a;
            background: #434c5e;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .project-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #eceff4;
            margin-bottom: 5px;
        }

        .project-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active { background: rgba(163, 190, 140, 0.2); color: #a3be8c; }
        .status-archive { background: rgba(76, 86, 106, 0.2); color: #d8dee9; }
        .status-wip { background: rgba(235, 203, 139, 0.2); color: #ebcb8b; }
        .status-urgent { background: rgba(191, 97, 106, 0.2); color: #bf616a; }

        .project-description {
            color: #d8dee9;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .project-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
            color: #8899a6;
            margin-bottom: 15px;
        }

        .project-meta div {
            display: flex;
            flex-direction: column;
        }

        .project-meta strong {
            color: #eceff4;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .project-path {
            background: #2e3440;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            color: #88c0d0;
            margin-bottom: 15px;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .project-actions button {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #3b4252;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #eceff4;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #eceff4;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #4c566a;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #2e3440;
            color: #d8dee9;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #3b4252;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .empty-state h2 {
            color: #eceff4;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #d8dee9;
            margin-bottom: 20px;
        }

        .stats {
            background: #3b4252;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #88c0d0;
        }

        .stat-label {
            color: #d8dee9;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏗️ GDL-UI-Studio</h1>
            <div class="toolbar">
                <button class="btn btn-primary" onclick="showCreateProjectModal()">
                    ➕ Neues Projekt
                </button>
            </div>
        </header>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalProjects">0</div>
                <div class="stat-label">Projekte</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeProjects">0</div>
                <div class="stat-label">Aktiv</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wipProjects">0</div>
                <div class="stat-label">In Arbeit</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="urgentProjects">0</div>
                <div class="stat-label">Dringend</div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Projekte durchsuchen..." oninput="filterProjects()">
            <div class="filter-tabs">
                <div class="filter-tab active" data-filter="all" onclick="setFilter('all')">Alle</div>
                <div class="filter-tab" data-filter="active" onclick="setFilter('active')">Aktiv</div>
                <div class="filter-tab" data-filter="wip" onclick="setFilter('wip')">WIP</div>
                <div class="filter-tab" data-filter="urgent" onclick="setFilter('urgent')">Dringend</div>
                <div class="filter-tab" data-filter="archive" onclick="setFilter('archive')">Archiv</div>
            </div>
        </div>

        <div class="projects-grid" id="projectsGrid">
            <!-- Projects will be loaded here -->
        </div>
    </div>

    <!-- Create/Edit Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Neues Projekt erstellen</h2>
            </div>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                
                <div class="form-group">
                    <label for="projectName">Projektname *</label>
                    <input type="text" id="projectName" required>
                </div>

                <div class="form-group">
                    <label for="projectDescription">Beschreibung</label>
                    <textarea id="projectDescription"></textarea>
                </div>

                <div class="form-group">
                    <label for="projectStatus">Status</label>
                    <select id="projectStatus">
                        <option value="active">Aktiv</option>
                        <option value="wip">Work in Progress</option>
                        <option value="urgent">Dringend</option>
                        <option value="archive">Archiv</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="projectPath">Ordnerpfad (optional)</label>
                    <input type="text" id="projectPath" placeholder="/Pfad/zum/GDL/Projekt">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
                    <button type="submit" class="btn btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '../backend/public/api';
        let allProjects = [];
        let currentFilter = 'all';

        // Load projects on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadProjects();
        });

        async function loadProjects() {
            try {
                const response = await fetch(`${API_BASE}/projects`);
                const data = await response.json();
                
                if (data.success) {
                    allProjects = data.data || [];
                    updateStats();
                    renderProjects();
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                showEmptyState();
            }
        }

        function updateStats() {
            document.getElementById('totalProjects').textContent = allProjects.length;
            document.getElementById('activeProjects').textContent = 
                allProjects.filter(p => p.status === 'active').length;
            document.getElementById('wipProjects').textContent = 
                allProjects.filter(p => p.status === 'wip').length;
            document.getElementById('urgentProjects').textContent = 
                allProjects.filter(p => p.status === 'urgent').length;
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            
            if (allProjects.length === 0) {
                showEmptyState();
                return;
            }

            const filtered = filterProjectsBySearch();
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>Keine Projekte gefunden</h2><p>Versuchen Sie eine andere Suche oder Filter</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(project => `
                <div class="project-card status-${project.status}" onclick="openProject(${project.id})">
                    <div class="project-header">
                        <div>
                            <div class="project-name">${escapeHtml(project.name)}</div>
                            <span class="project-status status-${project.status}">${getStatusLabel(project.status)}</span>
                        </div>
                    </div>
                    
                    <div class="project-description">
                        ${escapeHtml(project.description || 'Keine Beschreibung')}
                    </div>
                    
                    ${project.folder_path ? `
                        <div class="project-path" title="${escapeHtml(project.folder_path)}">
                            📁 ${escapeHtml(project.folder_path)}
                        </div>
                    ` : ''}
                    
                    <div class="project-meta">
                        <div>
                            <strong>Erstellt</strong>
                            ${formatDate(project.created_at)}
                        </div>
                        <div>
                            <strong>Geändert</strong>
                            ${formatDate(project.updated_at)}
                        </div>
                    </div>
                    
                    <div class="project-actions" onclick="event.stopPropagation()">
                        <button class="btn btn-secondary" onclick="editProject(${project.id})">✏️ Bearbeiten</button>
                        <button class="btn btn-secondary" onclick="duplicateProject(${project.id})">📋 Duplizieren</button>
                        <button class="btn btn-danger" onclick="deleteProject(${project.id})">🗑️ Löschen</button>
                    </div>
                </div>
            `).join('');
        }

        function filterProjectsBySearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            return allProjects.filter(project => {
                // Filter by status
                if (currentFilter !== 'all' && project.status !== currentFilter) {
                    return false;
                }
                
                // Filter by search term
                if (searchTerm) {
                    const nameMatch = project.name.toLowerCase().includes(searchTerm);
                    const descMatch = (project.description || '').toLowerCase().includes(searchTerm);
                    const pathMatch = (project.folder_path || '').toLowerCase().includes(searchTerm);
                    return nameMatch || descMatch || pathMatch;
                }
                
                return true;
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            renderProjects();
        }

        function filterProjects() {
            renderProjects();
        }

        function showCreateProjectModal() {
            document.getElementById('modalTitle').textContent = 'Neues Projekt erstellen';
            document.getElementById('projectForm').reset();
            document.getElementById('projectId').value = '';
            document.getElementById('projectModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
        }

        async function editProject(id) {
            const project = allProjects.find(p => p.id === id);
            if (!project) return;

            document.getElementById('modalTitle').textContent = 'Projekt bearbeiten';
            document.getElementById('projectId').value = project.id;
            document.getElementById('projectName').value = project.name;
            document.getElementById('projectDescription').value = project.description || '';
            document.getElementById('projectStatus').value = project.status || 'active';
            document.getElementById('projectPath').value = project.folder_path || '';
            document.getElementById('projectModal').classList.add('active');
        }

        async function duplicateProject(id) {
            const project = allProjects.find(p => p.id === id);
            if (!project) return;

            if (!confirm(`Möchten Sie das Projekt "${project.name}" wirklich duplizieren?`)) return;

            try {
                const response = await fetch(`${API_BASE}/projects/${id}/duplicate`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    alert('Projekt erfolgreich dupliziert!');
                    loadProjects();
                } else {
                    alert('Fehler beim Duplizieren: ' + (data.error || 'Unbekannter Fehler'));
                }
            } catch (error) {
                console.error('Error duplicating project:', error);
                alert('Fehler beim Duplizieren des Projekts');
            }
        }

        async function deleteProject(id) {
            const project = allProjects.find(p => p.id === id);
            if (!project) return;

            if (!confirm(`Möchten Sie das Projekt "${project.name}" wirklich löschen?\n\nDies wird auch alle zugehörigen Objekte und Parameter löschen!`)) return;

            try {
                const response = await fetch(`${API_BASE}/projects/${id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    loadProjects();
                } else {
                    alert('Fehler beim Löschen: ' + (data.error || 'Unbekannter Fehler'));
                }
            } catch (error) {
                console.error('Error deleting project:', error);
                alert('Fehler beim Löschen des Projekts');
            }
        }

        function openProject(id) {
            // Save selected project to localStorage
            localStorage.setItem('currentProjectId', id);
            // Navigate to object selection page
            window.location.href = 'object-selection.html';
        }

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const projectId = document.getElementById('projectId').value;
            const formData = {
                name: document.getElementById('projectName').value,
                description: document.getElementById('projectDescription').value,
                status: document.getElementById('projectStatus').value,
                folder_path: document.getElementById('projectPath').value || null
            };

            try {
                const url = projectId 
                    ? `${API_BASE}/projects/${projectId}`
                    : `${API_BASE}/projects`;
                
                const method = projectId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    closeModal();
                    loadProjects();
                } else {
                    alert('Fehler: ' + (data.error || 'Unbekannter Fehler'));
                }
            } catch (error) {
                console.error('Error saving project:', error);
                alert('Fehler beim Speichern des Projekts');
            }
        });

        function showEmptyState() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <h2>Noch keine Projekte</h2>
                    <p>Erstellen Sie Ihr erstes GDL-Projekt</p>
                    <button class="btn btn-primary" onclick="showCreateProjectModal()">
                        ➕ Neues Projekt erstellen
                    </button>
                </div>
            `;
        }

        function getStatusLabel(status) {
            const labels = {
                'active': 'Aktiv',
                'archive': 'Archiv',
                'wip': 'WIP',
                'urgent': 'Dringend'
            };
            return labels[status] || status;
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('de-DE', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal when clicking outside
        document.getElementById('projectModal').addEventListener('click', (e) => {
            if (e.target.id === 'projectModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
