<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDL Workbench - Dashboard</title>
    <link rel="stylesheet" href="style.css?v=20260128">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Override some style.css for this page's specific layout */
        body {
            height: auto;
            overflow: auto;
        }

        .container {
            max-width: 1650px;
            margin: 0 auto;
            padding: 20px;
        }


        .toolbar {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #5e81ac;
            color: white;
        }

        .btn-primary:hover {
            background: #81a1c1;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(94, 129, 172, 0.3);
        }

        .btn-secondary {
            background: #4c566a;
            color: #d8dee9;
        }

        .btn-secondary:hover {
            background: #5e6a7e;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .search-bar {
            background: #3b4252;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #4c566a;
            border-radius: 6px;
            font-size: 16px;
            background: #2e3440;
            color: #d8dee9;
            transition: border 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #88c0d0;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .filter-tab {
            padding: 8px 16px;
            border: 2px solid #4c566a;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            background: #2e3440;
            color: #d8dee9;
        }

        .filter-tab.active {
            background: #5e81ac;
            color: white;
            border-color: #5e81ac;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .project-card {
            background: #3b4252;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            color: #eceff4;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            background: #434c5e;
        }

        .project-card.status-active {
            border-left: 5px solid #a3be8c;
            background: #434c5e;
        }

        .project-card.status-archive {
            border-left: 5px solid #4c566a;
            background: #3b4252;
        }

        .project-card.status-wip {
            border-left: 5px solid #ebcb8b;
            background: #434c5e;
        }

        .project-card.status-urgent {
            border-left: 5px solid #bf616a;
            background: #434c5e;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .project-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #eceff4;
            margin-bottom: 5px;
        }

        .project-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(163, 190, 140, 0.2);
            color: #a3be8c;
        }

        .status-archive {
            background: rgba(76, 86, 106, 0.2);
            color: #d8dee9;
        }

        .status-wip {
            background: rgba(235, 203, 139, 0.2);
            color: #ebcb8b;
        }

        .status-urgent {
            background: rgba(191, 97, 106, 0.2);
            color: #bf616a;
        }

        .project-description {
            color: #d8dee9;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            min-height: 40px;
        }

        .project-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 12px;
            color: #8899a6;
            margin-bottom: 15px;
        }

        .project-meta div {
            display: flex;
            flex-direction: column;
        }

        .project-meta strong {
            color: #eceff4;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .project-path {
            background: #2e3440;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            color: #88c0d0;
            margin-bottom: 15px;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .project-actions button {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #3b4252;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #eceff4;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #eceff4;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #4c566a;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #2e3440;
            color: #d8dee9;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #3b4252;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .empty-state h2 {
            color: #eceff4;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #d8dee9;
            margin-bottom: 20px;
        }

        .stats {
            background: #3b4252;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #88c0d0;
        }

        .stat-label {
            color: #d8dee9;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <!-- HEADER -->
    <header class="app-header">
        <div class="header-left">
            <span class="logo">GDL Workbench</span>
            <span class="project-info" id="headerProjectName">Dashboard</span>
            <span style="font-size: 0.85em; color: #8899a6; margin-left: 15px;">v1.5.0</span>
        </div>
        <div class="header-right">
            <span style="font-size: 0.8em; color: #8899a6; margin-right: 15px;">Joachim Suehlo ©2026 b-prisma®</span>
            <div class="lang-switcher">
                <select>
                    <option value="de">Deutsch</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </header>

    <!-- MAIN NAVIGATION -->
    <nav class="main-nav">
        <a href="dashboard.html" class="nav-button active">Projektverwaltung</a>
        <a href="object-selection.html" class="nav-button">Objektverwaltung</a>
        <a href="param-management.html" class="nav-button">Parameterverwaltung</a>
        <a href="index.html" class="nav-button">UI Designer</a>
        <a href="script-editor.html" class="nav-button">Skript Editor</a>
        <a href="build-tasks.html" class="nav-button">Build Tasks</a>
    </nav>

    <div class="container">

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="totalProjects">0</div>
                <div class="stat-label">Projekte</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="activeProjects">0</div>
                <div class="stat-label">Aktiv</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wipProjects">0</div>
                <div class="stat-label">In Arbeit</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="urgentProjects">0</div>
                <div class="stat-label">Dringend</div>
            </div>
        </div>

        <div class="search-bar">
            <div style="display:flex; gap:10px; margin-bottom: 10px;">
                <input type="text" id="searchInput" placeholder="🔍 Projekte durchsuchen..." oninput="filterProjects()">
                <select id="sortSelect" onchange="sortProjects()"
                    style="width: auto; padding: 0 15px; border-radius: 6px; background: #2e3440; color: #d8dee9; border: 2px solid #4c566a;">
                    <option value="date_desc">📅 Datum (Neu)</option>
                    <option value="date_asc">📅 Datum (Alt)</option>
                    <option value="name_asc">abc Name (A-Z)</option>
                    <option value="name_desc">abc Name (Z-A)</option>
                </select>
            </div>
            <div class="filter-tabs">
                <div class="filter-tab active" data-filter="all" onclick="setFilter('all')">Alle</div>
                <div class="filter-tab" data-filter="active" onclick="setFilter('active')">Aktiv</div>
                <div class="filter-tab" data-filter="wip" onclick="setFilter('wip')">WIP</div>
                <div class="filter-tab" data-filter="urgent" onclick="setFilter('urgent')">Dringend</div>
                <div class="filter-tab" data-filter="archive" onclick="setFilter('archive')">Archiv</div>
            </div>
        </div>

        <div class="projects-grid" id="projectsGrid">
            <!-- Projects will be loaded here -->
        </div>

        <footer
            style="margin-top: 40px; padding: 20px; border-top: 1px solid #4c566a; color: #8899a6; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <span>Version 1.5.0</span> | <span>05.02.2026</span>
            </div>
            <div>
                <a href="release_notes.html" style="color: #88c0d0; text-decoration: none;">Release Notes</a>
            </div>
        </footer>
    </div>

    <!-- Create/Edit Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Neues Projekt erstellen</h2>
            </div>
            <form id="projectForm">
                <input type="hidden" id="projectId">

                <div class="form-group">
                    <label for="projectName">Projektname *</label>
                    <input type="text" id="projectName" required>
                </div>

                <div class="form-group">
                    <label for="projectDescription">Beschreibung</label>
                    <textarea id="projectDescription"></textarea>
                </div>

                <div class="form-group">
                    <label for="projectStatus">Status</label>
                    <select id="projectStatus">
                        <option value="active">Aktiv</option>
                        <option value="wip">Work in Progress</option>
                        <option value="urgent">Dringend</option>
                        <option value="archive">Archiv</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
                    <button type="submit" class="btn btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '../backend/public/api/local'; // Default to local-first

        let allProjects = [];
        let currentFilter = 'all';

        // Load projects on page load
        window.addEventListener('DOMContentLoaded', () => {
            // UI-Designer-Link mit objectId versehen (gleiches Objekt in allen Browsern)
            const uiDesignerLink = document.querySelector('.main-nav a[href="index.html"]');
            if (uiDesignerLink) {
                const oid = localStorage.getItem('currentGdlObjectId');
                uiDesignerLink.href = oid ? `index.html?objectId=${encodeURIComponent(oid)}` : 'index.html';
            }
            loadProjects();
        });

        async function loadProjects() {
            try {
                const response = await fetch(`${API_BASE}/projects`);
                const data = await response.json();

                if (data.success) {
                    allProjects = data.data || [];
                    updateStats();
                    renderProjects();
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading projects:', error);
                showEmptyState();
            }
        }

        function updateStats() {
            document.getElementById('totalProjects').textContent = allProjects.length;
            document.getElementById('activeProjects').textContent =
                allProjects.filter(p => p.status === 'active').length;
            document.getElementById('wipProjects').textContent =
                allProjects.filter(p => p.status === 'wip').length;
            document.getElementById('urgentProjects').textContent =
                allProjects.filter(p => p.status === 'urgent').length;
        }

        let currentSort = 'date_desc';

        function sortProjects() {
            currentSort = document.getElementById('sortSelect').value;
            renderProjects();
        }

        function getSortedProjects(projects) {
            return projects.sort((a, b) => {
                switch (currentSort) {
                    case 'date_desc':
                        return new Date(b.updated_at) - new Date(a.updated_at);
                    case 'date_asc':
                        return new Date(a.updated_at) - new Date(b.updated_at);
                    case 'name_asc':
                        return a.name.localeCompare(b.name);
                    case 'name_desc':
                        return b.name.localeCompare(a.name);
                    default:
                        return 0;
                }
            });
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');

            if (allProjects.length === 0) {
                showEmptyState();
                return;
            }

            let filtered = filterProjectsBySearch();
            filtered = getSortedProjects(filtered); // Apply Sorting

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><h2>Keine Projekte gefunden</h2><p>Versuchen Sie eine andere Suche oder Filter</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(project => `
                <div class="project-card status-${project.status}" onclick="openProject('${project.id}')">
                    <div class="project-header">
                        <div>
                            <div class="project-name">${escapeHtml(project.name)}</div>
                            <span class="project-status status-${project.status}">${getStatusLabel(project.status)}</span>
                        </div>
                    </div>
                    
                    <div class="project-description">
                        ${escapeHtml(project.description || 'Keine Beschreibung')}
                    </div>
                    
                    <div class="project-meta">
                        <div>
                            <strong>Erstellt</strong>
                            ${formatDate(project.created_at)}
                        </div>
                        <div>
                            <strong>Geändert</strong>
                            ${formatDate(project.updated_at)}
                        </div>
                    </div>
                    
                    <div class="project-actions" onclick="event.stopPropagation()">
                        <button class="btn btn-secondary" onclick="editProject('${project.id}')">✏️ Bearbeiten</button>
                    </div>
                </div>
            `).join('');
        }

        function filterProjectsBySearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            return allProjects.filter(project => {
                // Filter by status
                if (currentFilter !== 'all' && project.status !== currentFilter) {
                    return false;
                }

                // Filter by search term
                if (searchTerm) {
                    const nameMatch = project.name.toLowerCase().includes(searchTerm);
                    const descMatch = (project.description || '').toLowerCase().includes(searchTerm);
                    return nameMatch || descMatch;
                }

                return true;
            });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === filter);
            });
            renderProjects();
        }

        function filterProjects() {
            renderProjects();
        }

        function closeModal() {
            document.getElementById('projectModal').classList.remove('active');
        }

        async function editProject(id) {
            const project = allProjects.find(p => p.id === id);
            if (!project) return;

            document.getElementById('modalTitle').textContent = 'Projekt bearbeiten';
            document.getElementById('projectId').value = project.id;
            document.getElementById('projectName').value = project.name;
            document.getElementById('projectDescription').value = project.description || '';
            document.getElementById('projectStatus').value = project.status || 'active';
            document.getElementById('projectModal').classList.add('active');
        }

        function openProject(id) {
            localStorage.setItem('currentProjectId', id);
            window.location.href = 'object-selection.html';
        }

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const projectId = document.getElementById('projectId').value;
            const formData = {
                name: document.getElementById('projectName').value,
                description: document.getElementById('projectDescription').value,
                status: document.getElementById('projectStatus').value
            };

            try {
                const url = projectId
                    ? `${API_BASE}/projects/${projectId}`
                    : `${API_BASE}/projects`;

                const method = projectId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    closeModal();
                    loadProjects();
                } else {
                    alert('Fehler: ' + (data.error || 'Unbekannter Fehler'));
                }
            } catch (error) {
                console.error('Error saving project:', error);
                alert('Fehler beim Speichern des Projekts');
            }
        });

        function showEmptyState() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = `
                <div class="empty-state">
                    <h2>Keine Projekte vorhanden</h2>
                    <p>Fügen Sie Projekte in den Synchronisations-Pfad ein.</p>
                </div>
            `;
        }

        function getStatusLabel(status) {
            const labels = {
                'active': 'Aktiv',
                'archive': 'Archiv',
                'wip': 'WIP',
                'urgent': 'Dringend'
            };
            return labels[status] || status;
        }

        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleDateString('de-DE', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }

        function escapeHtml(unsafe) {
            return unsafe
                ? unsafe
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;")
                : '';
        }
    </script>
</body>

</html>
