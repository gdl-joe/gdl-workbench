<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDL Workbench - Skript Editor</title>
    <link rel="stylesheet" href="style.css?v=20260205">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="i18n.js"></script>
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="gdl-monaco-config.js"></script>
    <style>
        .script-editor-page {
            display: grid !important;
            grid-template-columns: 200px 1fr !important;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="header-left">
                <span class="logo">GDL Workbench</span>
                <span class="project-info" id="headerProjectName"><span data-i18n="project">Projekt</span>: -</span>
                <span class="object-info" id="headerObjectName"><span data-i18n="object">Objekt</span>: -</span>
            </div>
            <div class="header-right">
                <button class="header-btn primary" id="saveEditorBtn" title="Aktuelles Script in Datenbank speichern"
                    data-i18n="save">
                    <i class="fas fa-database"></i> Speichern
                </button>
                <span class="separator">|</span>
                <div class="lang-switcher">
                    <select>
                        <option value="de">Deutsch</option>
                        <option value="en">English</option>
                        <option value="fr">Français</option>
                        <option value="es">Español</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- MAIN NAVIGATION -->
        <nav class="main-nav">
            <a href="dashboard.html" class="nav-button" data-i18n="nav_dashboard">Projektverwaltung</a>
            <a href="object-selection.html" class="nav-button" data-i18n="nav_objects">Objektverwaltung</a>
            <a href="param-management.html" class="nav-button" data-i18n="nav_params">Parameterverwaltung</a>
            <a href="index.html" class="nav-button" data-i18n="nav_ui_designer">UI Designer</a>
            <a href="script-editor.html" class="nav-button active" data-i18n="nav_scripts">Script Editor</a>
            <a href="codeschmiede.html" class="nav-button" data-i18n="nav_codeschmiede">Codeschmiede</a>
            <a href="build-tasks.html" class="nav-button" data-i18n="nav_build">Build Tasks</a>
        </nav>

        <!-- MAIN CONTENT AREA - Script Editor -->
        <main class="app-main script-editor-page">
            <aside class="left-panel">
                <h3 data-i18n="gdl_scripts">GDL Skripte</h3>
                <div class="config-section">
                    <button class="action-btn script-btn" data-type="script_master"><i class="fas fa-code"></i> Master
                        Script</button>
                    <button class="action-btn script-btn" data-type="script_2d"><i class="fas fa-code"></i> 2D
                        Script</button>
                    <button class="action-btn script-btn" data-type="script_3d"><i class="fas fa-code"></i> 3D
                        Script</button>
                    <button class="action-btn script-btn" data-type="script_parameter"><i class="fas fa-code"></i>
                        Parameter Script</button>
                    <button class="action-btn script-btn" data-type="script_ui"><i class="fas fa-code"></i> Interface
                        Script</button>
                    <button class="action-btn script-btn" data-type="script_properties"><i class="fas fa-code"></i>
                        Properties Script</button>
                    <button class="action-btn script-btn" data-type="script_migration_forward"><i
                            class="fas fa-code"></i> Forward Migration</button>
                    <button class="action-btn script-btn" data-type="script_migration_backward"><i
                            class="fas fa-code"></i> Backward Migration</button>
                </div>

                <h3 data-i18n="project_files">Projektdateien</h3>
                <div class="config-section">
                    <button class="action-btn script-btn" data-type="xml"><i class="fas fa-file-code"></i>
                        Parameters.xml</button>
                </div>

                <div style="margin-top: auto; padding-top: 20px;">
                    <button id="exportToFilesBtn" class="action-btn primary"
                        title="Alle Scripts und XML in lokale Dateien exportieren" data-i18n="update_all_files">
                        <i class="fas fa-folder-open"></i> Alle Dateien aktualisieren
                    </button>
                    <button id="reloadFromFilesBtn" class="action-btn" title="Skripte von lokalen Dateien neu laden"
                        style="margin-top: 10px;" data-i18n="reload_from_files">
                        <i class="fas fa-sync-alt"></i> Reload from Files
                    </button>
                </div>
            </aside>

            <section class="central-panel">
                <div id="editorInfoBar">
                    <span data-i18n="file">Datei</span>: <span id="currentFileName">-</span>
                </div>
                <div id="monacoContainer"></div>
            </section>


        </main>

        <!-- FOOTER -->
        <footer class="app-footer">
            <div class="footer-status" id="statusMessage" data-i18n="status_ready">Status: Bereit</div>
        </footer>
    </div>
    <script src="script-editor.js?v=20260207"></script>
</body>

</html>
